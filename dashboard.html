<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi biblioteca — Stillova</title>
  <meta name="theme-color" content="#07081a">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script data-clerk-publishable-key="pk_live_Y2xlcmsuc3RpbGxvdmEuY29tJA" src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js" type="text/javascript"></script>

  <style>
    body { min-height: 100vh; }

    .dash-wrap {
      position: relative;
      z-index: 1;
      max-width: 440px;
      margin: 0 auto;
      padding: 0 24px 88px;
    }

    /* Header */
    .dash-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 32px;
    }

    .dash-logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dash-logo span {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 1.35rem;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .dash-header-spacer { width: 40px; }

    /* Plan row */
    .dash-plan-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .dash-credits {
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* Stats */
    .dash-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 8px;
      text-align: center;
    }

    .stat-value {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 1.8rem;
      color: var(--text);
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-label {
      font-size: 0.62rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      line-height: 1.3;
    }

    /* Section title */
    .dash-section-title {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* Meditation cards */
    .med-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: border-color 0.2s;
    }

    .med-card:hover { border-color: rgba(110, 110, 200, 0.28); }

    .med-card-content { flex: 1; min-width: 0; }

    .med-card-title {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--text);
      margin-bottom: 5px;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .med-card-meta {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .med-card-right {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .med-play-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--border-on);
      background: transparent;
      color: var(--purple-light);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }

    .med-play-btn:hover { background: rgba(157, 98, 248, 0.12); }

    .med-play-btn.playing {
      background: var(--purple);
      border-color: var(--purple);
      color: #fff;
    }

    /* Mini player inline */
    .med-player {
      margin-top: 10px;
      display: none;
    }

    .med-player.visible { display: block; }

    .med-progress-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .med-time {
      font-size: 0.65rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      width: 30px;
      flex-shrink: 0;
    }

    .med-time-end { text-align: left; }

    .med-progress-track {
      flex: 1;
      height: 4px;
      background: var(--bg3);
      border-radius: 99px;
      cursor: pointer;
    }

    .med-progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right, var(--blue), var(--purple));
      border-radius: 99px;
      transition: width 0.4s linear;
      pointer-events: none;
    }

    /* Empty state */
    .dash-empty {
      text-align: center;
      padding: 48px 20px;
    }

    .dash-empty-title {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 1.15rem;
      color: var(--text);
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .dash-empty-sub {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.7;
      max-width: 260px;
      margin: 0 auto;
    }

    .dash-empty-link {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 24px;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      border-radius: 12px;
      color: #fff;
      text-decoration: none;
      font-size: 0.87rem;
      font-weight: 500;
    }

    /* Loading */
    .dash-loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      font-size: 0.85rem;
    }

    /* Error */
    .dash-error {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    @media (max-width: 430px) {
      .dash-wrap { padding: 0 18px 72px; }
      .stat-value { font-size: 1.45rem; }
      .stat-label { font-size: 0.58rem; }
      .med-card { padding: 14px 12px; }
      .med-card-title { font-size: 0.92rem; }
    }

    @media (max-width: 360px) {
      .dash-wrap { padding: 0 14px 72px; }
      .stat-card { padding: 14px 6px; }
      .stat-value { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

  <div class="bg-glow"></div>

  <div class="dash-wrap">

    <!-- Header -->
    <header class="dash-header">
      <a href="/" class="btn-back" style="position:static">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M11 4L6 9l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
      <div class="dash-logo">
        <div class="logo-dot"></div>
        <span>Stillova</span>
      </div>
      <div class="dash-header-spacer"></div>
    </header>

    <!-- Loading -->
    <div id="dash-loading" class="dash-loading">Cargando tu biblioteca...</div>

    <!-- Error -->
    <div id="dash-error" class="dash-error" style="display:none">
      <p>Inicia sesión para ver tu biblioteca.</p>
      <a href="/" style="color:var(--purple-light);font-size:0.85rem;margin-top:12px;display:inline-block;">Ir a la app</a>
    </div>

    <!-- Contenido principal -->
    <div id="dash-content" style="display:none">

      <!-- Plan + créditos -->
      <div class="dash-plan-row">
        <span id="dash-plan-badge" class="plan-badge"></span>
        <span id="dash-credits" class="dash-credits"></span>
      </div>

      <!-- Stats -->
      <div class="dash-stats">
        <div class="stat-card">
          <div class="stat-value" id="stat-streak">0</div>
          <div class="stat-label">días de racha</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-minutes">0</div>
          <div class="stat-label">minutos meditados</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-sessions">0</div>
          <div class="stat-label">sesiones totales</div>
        </div>
      </div>

      <!-- Biblioteca -->
      <p class="dash-section-title">Tu biblioteca</p>
      <div id="dash-library"></div>

    </div>

  </div>

  <!-- Audio compartido para el player del dashboard -->
  <audio id="dash-audio"></audio>

  <script>
    // ── Clerk auth ──────────────────────────────────────────────────
    let clerk = null;

    async function initClerk() {
      let attempts = 0;
      while (!window.Clerk && attempts < 50) {
        await new Promise(r => setTimeout(r, 100));
        attempts++;
      }
      if (!window.Clerk) {
        showError();
        return;
      }
      clerk = window.Clerk;
      await clerk.load();

      if (!clerk.user) {
        showError();
        return;
      }

      loadDashboard();
    }

    function showError() {
      document.getElementById('dash-loading').style.display = 'none';
      document.getElementById('dash-error').style.display = 'block';
    }

    // ── Cargar datos del dashboard ──────────────────────────────────
    async function loadDashboard() {
      try {
        const token = await clerk.session.getToken();
        const email = clerk.user?.primaryEmailAddress?.emailAddress || '';

        const res = await fetch('/api/dashboard', {
          headers: {
            'Authorization': `Bearer ${token}`,
            'x-user-email': email
          }
        });

        if (!res.ok) throw new Error('Error al cargar el dashboard');

        const data = await res.json();
        renderDashboard(data);
      } catch (e) {
        console.error('[dashboard] Error:', e);
        showError();
      }
    }

    // ── Renderizar ──────────────────────────────────────────────────
    function renderDashboard(data) {
      const { plan, usage, limit, totalMinutes, streak, totalSessions, savedCount, meditations } = data;

      // Plan badge
      const badge = document.getElementById('dash-plan-badge');
      const planNames = { free: 'Gratis', essential: 'Essential', premium: 'Premium' };
      badge.textContent = planNames[plan] || plan;
      badge.className = `plan-badge plan-${plan}`;

      // Créditos
      const creditsEl = document.getElementById('dash-credits');
      if (plan === 'free') {
        creditsEl.textContent = '';
      } else {
        const remaining = limit - usage;
        creditsEl.textContent = `${remaining} crédito${remaining !== 1 ? 's' : ''} este mes`;
      }

      // Stats
      document.getElementById('stat-streak').textContent = streak;
      document.getElementById('stat-minutes').textContent = totalMinutes;
      document.getElementById('stat-sessions').textContent = totalSessions;

      // Biblioteca
      const library = document.getElementById('dash-library');
      if (!meditations || meditations.length === 0) {
        library.innerHTML = `
          <div class="dash-empty">
            <p class="dash-empty-title">Tu biblioteca está vacía.</p>
            <p class="dash-empty-sub">Cuando termines una meditación, pulsa "Guardar en mi biblioteca" para volver a escucharla cuando quieras.</p>
            <a href="/" class="dash-empty-link">Crear una meditación</a>
          </div>
        `;
      } else {
        library.innerHTML = meditations.map(m => renderMedCard(m)).join('');
      }

      document.getElementById('dash-loading').style.display = 'none';
      document.getElementById('dash-content').style.display = 'block';
    }

    function renderMedCard(m) {
      const dateStr = formatDate(m.created_at);
      const voiceLabel = m.voice === 'masculine' ? 'Voz masculina' : 'Voz femenina';
      const hasAudio = !!m.audioUrl;
      const id = m.id;

      const playBtn = hasAudio ? `
        <button class="med-play-btn" id="play-btn-${id}" onclick="togglePlay('${id}', '${escapeAttr(m.audioUrl)}', ${m.duration})">
          <svg id="icon-play-${id}" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M5 3.5l8 4.5-8 4.5V3.5z" fill="currentColor"/>
          </svg>
          <svg id="icon-pause-${id}" width="16" height="16" viewBox="0 0 16 16" fill="none" style="display:none">
            <rect x="3.5" y="2.5" width="3" height="11" rx="1" fill="currentColor"/>
            <rect x="9.5" y="2.5" width="3" height="11" rx="1" fill="currentColor"/>
          </svg>
        </button>
      ` : `<div style="width:38px"></div>`;

      const player = hasAudio ? `
        <div class="med-player" id="player-${id}">
          <div class="med-progress-row">
            <span class="med-time" id="time-${id}">0:00</span>
            <div class="med-progress-track" onclick="seekMed('${id}', event)">
              <div class="med-progress-fill" id="fill-${id}"></div>
            </div>
            <span class="med-time med-time-end" id="dur-${id}">-</span>
          </div>
        </div>
      ` : '';

      return `
        <div class="med-card">
          <div class="med-card-content">
            <div class="med-card-title" title="${escapeAttr(m.title)}">${escapeHtml(m.title)}</div>
            <div class="med-card-meta">${dateStr} · ${m.duration} min · ${voiceLabel}</div>
            ${player}
          </div>
          <div class="med-card-right">
            ${playBtn}
          </div>
        </div>
      `;
    }

    // ── Player de dashboard ─────────────────────────────────────────
    let activeId = null;
    let progressInterval = null;
    const dashAudio = document.getElementById('dash-audio');

    function togglePlay(id, audioUrl, durationMin) {
      if (activeId === id) {
        if (dashAudio.paused) {
          dashAudio.play();
          setPlayingState(id, true);
        } else {
          dashAudio.pause();
          setPlayingState(id, false);
        }
        return;
      }

      // Detener el anterior
      if (activeId) {
        dashAudio.pause();
        setPlayingState(activeId, false);
        document.getElementById(`player-${activeId}`).classList.remove('visible');
      }

      clearInterval(progressInterval);

      // Iniciar nuevo
      activeId = id;
      dashAudio.src = audioUrl;
      document.getElementById(`player-${id}`).classList.add('visible');
      document.getElementById(`dur-${id}`).textContent = `${durationMin}:00`;

      dashAudio.play().catch(e => {
        console.error('[player] Error reproduciendo:', e);
        activeId = null;
        document.getElementById(`player-${id}`).classList.remove('visible');
      });

      setPlayingState(id, true);

      progressInterval = setInterval(() => {
        if (!dashAudio.duration) return;
        const pct = (dashAudio.currentTime / dashAudio.duration) * 100;
        const fill = document.getElementById(`fill-${id}`);
        const timeEl = document.getElementById(`time-${id}`);
        if (fill) fill.style.width = `${pct}%`;
        if (timeEl) timeEl.textContent = formatTime(Math.floor(dashAudio.currentTime));
      }, 400);

      dashAudio.onended = () => {
        setPlayingState(id, false);
        clearInterval(progressInterval);
        const fill = document.getElementById(`fill-${id}`);
        const timeEl = document.getElementById(`time-${id}`);
        if (fill) fill.style.width = '0%';
        if (timeEl) timeEl.textContent = '0:00';
        activeId = null;
      };
    }

    function seekMed(id, event) {
      if (activeId !== id || !dashAudio.duration) return;
      const track = event.currentTarget;
      const rect = track.getBoundingClientRect();
      const ratio = Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width));
      dashAudio.currentTime = ratio * dashAudio.duration;
    }

    function setPlayingState(id, playing) {
      const btn = document.getElementById(`play-btn-${id}`);
      const iconPlay = document.getElementById(`icon-play-${id}`);
      const iconPause = document.getElementById(`icon-pause-${id}`);
      if (!btn) return;
      btn.classList.toggle('playing', playing);
      if (iconPlay) iconPlay.style.display = playing ? 'none' : 'block';
      if (iconPause) iconPause.style.display = playing ? 'block' : 'none';
    }

    // ── Utilidades ──────────────────────────────────────────────────
    function formatTime(s) {
      return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
    }

    function formatDate(isoString) {
      const d = new Date(isoString);
      const now = new Date();
      const todayStr = now.toISOString().slice(0, 10);
      const yestStr = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
      const dStr = d.toISOString().slice(0, 10);
      if (dStr === todayStr) return 'Hoy';
      if (dStr === yestStr) return 'Ayer';
      const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
      const label = `${d.getDate()} ${months[d.getMonth()]}`;
      return d.getFullYear() !== now.getFullYear() ? `${label} ${d.getFullYear()}` : label;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function escapeAttr(str) {
      return String(str || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    // ── Init ────────────────────────────────────────────────────────
    initClerk();
  </script>

  <footer class="site-footer">
    <a href="/privacy.html">Privacidad</a>
    <span>·</span>
    <a href="/terms.html">Términos</a>
  </footer>

</body>
</html>
