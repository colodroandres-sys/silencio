<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca — Stillova</title>
  <meta name="theme-color" content="#0a0e08">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script data-clerk-publishable-key="pk_live_Y2xlcmsuc3RpbGxvdmEuY29tJA" src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js" type="text/javascript"></script>

  <style>
    /* Player inline del dashboard */
    .med-player { margin-top: 10px; display: none; }
    .med-player.visible { display: block; }
    .med-progress-row { display: flex; align-items: center; gap: 8px; }
    .med-time { font-size: 0.65rem; color: var(--text-45); font-variant-numeric: tabular-nums; width: 30px; flex-shrink: 0; }
    .med-time-end { text-align: left; }
    .med-progress-track { flex: 1; height: 3px; background: rgba(242,237,228,0.12); border-radius: 2px; cursor: pointer; }
    .med-progress-fill { height: 100%; width: 0%; background: var(--sand); border-radius: 2px; transition: width 0.4s linear; pointer-events: none; }
    .med-play-btn { background: rgba(201,169,110,0.12); border: 1px solid rgba(201,169,110,0.28); }
    .med-play-btn.playing { background: var(--sand); border-color: var(--sand); color: #0a0e08; }
    .dash-loading { text-align: center; padding: 80px 20px; color: var(--text-45); font-size: 0.875rem; }
    .dash-error { text-align: center; padding: 64px 20px; color: var(--text-45); font-size: 0.875rem; line-height: 1.6; }
    .dash-error a { color: var(--sand); text-decoration: none; display: inline-block; margin-top: 12px; }
  </style>
</head>
<body>

  <div class="bg-photo"></div>
  <div class="bg-overlay"></div>

  <div class="dash-wrap">

    <header class="dash-header">
      <a href="/" style="display:flex;align-items:center;color:var(--text-45);text-decoration:none;gap:6px;font-size:0.83rem;transition:color 0.2s;" onmouseover="this.style.color='var(--text-70)'" onmouseout="this.style.color='var(--text-45)'">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Inicio
      </a>
      <div class="logo"><span>Stillova</span></div>
      <div style="width:60px"></div>
    </header>

    <div id="dash-loading" class="dash-loading">Cargando tu biblioteca...</div>

    <div id="dash-error" class="dash-error" style="display:none">
      <p>Inicia sesión para ver tu biblioteca.</p>
      <a href="/">Ir a la app</a>
    </div>

    <div id="dash-content" style="display:none">

      <h1 class="dash-headline">Mi biblioteca</h1>

      <div class="dash-plan-row">
        <span id="dash-plan-badge" class="plan-badge"></span>
        <span id="dash-credits" class="dash-credits"></span>
      </div>

      <div class="dash-stats">
        <div class="stat-card">
          <div class="stat-value" id="stat-streak">0</div>
          <div class="stat-label">Racha</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-minutes">0</div>
          <div class="stat-label">Minutos</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-sessions">0</div>
          <div class="stat-label">Sesiones</div>
        </div>
      </div>

      <p class="dash-section-title">Guardadas</p>
      <div id="dash-library" class="med-list"></div>

    </div>

  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a class="nav-item" href="/">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M3 9.5L10 3l7 6.5V17a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
        <path d="M7.5 18V13h5v5" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
      </svg>
      Inicio
    </a>
    <div class="nav-create-wrap">
      <a class="nav-create-btn" href="/" aria-label="Crear meditación" style="text-decoration:none">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </a>
    </div>
    <a class="nav-item active" href="/dashboard.html">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect x="3" y="4" width="4" height="13" rx="1" stroke="currentColor" stroke-width="1.4"/>
        <rect x="8" y="4" width="4" height="13" rx="1" stroke="currentColor" stroke-width="1.4"/>
        <path d="M14.5 4.5l2.8 12.2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      Biblioteca
    </a>
  </nav>

  <audio id="dash-audio"></audio>

  <footer class="site-footer">
    <a href="/privacy.html">Privacidad</a>
    <span>·</span>
    <a href="/terms.html">Términos</a>
  </footer>

  <script>
    let clerk = null;

    async function initClerk() {
      let attempts = 0;
      while (!window.Clerk && attempts < 50) {
        await new Promise(r => setTimeout(r, 100));
        attempts++;
      }
      if (!window.Clerk) { showError(); return; }
      clerk = window.Clerk;
      await clerk.load();
      if (!clerk.user) { showError(); return; }
      loadDashboard();
    }

    function showError() {
      document.getElementById('dash-loading').style.display = 'none';
      document.getElementById('dash-error').style.display = 'block';
    }

    async function loadDashboard() {
      try {
        const token = await clerk.session.getToken();
        const email = clerk.user?.primaryEmailAddress?.emailAddress || '';
        const res = await fetch('/api/dashboard', {
          headers: { 'Authorization': `Bearer ${token}`, 'x-user-email': email }
        });
        if (!res.ok) throw new Error('Error al cargar');
        const data = await res.json();
        renderDashboard(data);
      } catch (e) {
        console.error('[dashboard]', e);
        showError();
      }
    }

    function renderDashboard(data) {
      const { plan, usage, limit, totalMinutes, streak, totalSessions, meditations } = data;

      const badge = document.getElementById('dash-plan-badge');
      const planNames = { free: 'Gratis', essential: 'Essential', premium: 'Premium' };
      badge.textContent = planNames[plan] || plan;
      badge.className = `plan-badge plan-${plan}`;

      const creditsEl = document.getElementById('dash-credits');
      if (plan !== 'free') {
        const rem = limit - usage;
        creditsEl.textContent = `${rem} crédito${rem !== 1 ? 's' : ''} este mes`;
      }

      document.getElementById('stat-streak').textContent   = streak || 0;
      document.getElementById('stat-minutes').textContent  = totalMinutes || 0;
      document.getElementById('stat-sessions').textContent = totalSessions || 0;

      const library = document.getElementById('dash-library');
      if (!meditations || meditations.length === 0) {
        library.innerHTML = `
          <div class="dash-empty">
            <strong>Aún no hay nada guardado.</strong>
            Cuando termines una meditación, pulsa "Guardar en mi biblioteca" para volver a escucharla.
            <br>
            <a class="dash-create-btn" href="/">Crear una meditación</a>
          </div>`;
      } else {
        library.innerHTML = meditations.map(m => renderMedCard(m)).join('');
      }

      document.getElementById('dash-loading').style.display  = 'none';
      document.getElementById('dash-content').style.display  = 'block';
    }

    function renderMedCard(m) {
      const dateStr   = formatDate(m.created_at);
      const voiceLabel = m.voice === 'masculine' ? 'Voz masculina' : 'Voz femenina';
      const hasAudio  = !!m.audioUrl;
      const id        = m.id;

      const playBtn = hasAudio ? `
        <button class="med-card-play med-play-btn" id="play-btn-${id}" onclick="togglePlay('${id}','${escapeAttr(m.audioUrl)}',${m.duration})">
          <svg id="icon-play-${id}" width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M4 2.5l8 4.5-8 4.5V2.5z" fill="currentColor"/>
          </svg>
          <svg id="icon-pause-${id}" width="14" height="14" viewBox="0 0 14 14" fill="none" style="display:none">
            <rect x="2.5" y="2" width="3" height="10" rx="1" fill="currentColor"/>
            <rect x="8.5" y="2" width="3" height="10" rx="1" fill="currentColor"/>
          </svg>
        </button>` : `<div style="width:36px"></div>`;

      const player = hasAudio ? `
        <div class="med-player" id="player-${id}">
          <div class="med-progress-row">
            <span class="med-time" id="time-${id}">0:00</span>
            <div class="med-progress-track" onclick="seekMed('${id}',event)">
              <div class="med-progress-fill" id="fill-${id}"></div>
            </div>
            <span class="med-time med-time-end" id="dur-${id}">-</span>
          </div>
        </div>` : '';

      return `
        <div class="med-card">
          <div class="med-card-header">
            <div>
              <div class="med-card-title">${escapeHtml(m.title)}</div>
              <div class="med-card-meta">
                <span>${dateStr}</span>
                <span>${m.duration} min</span>
                <span>${voiceLabel}</span>
              </div>
              ${player}
            </div>
            ${playBtn}
          </div>
        </div>`;
    }

    // ── Player ──────────────────────────────────────────────────────
    let activeId = null;
    let progressInterval = null;
    const dashAudio = document.getElementById('dash-audio');

    function togglePlay(id, audioUrl, durationMin) {
      if (activeId === id) {
        if (dashAudio.paused) { dashAudio.play(); setPlayingState(id, true); }
        else                  { dashAudio.pause(); setPlayingState(id, false); }
        return;
      }
      if (activeId) {
        dashAudio.pause();
        setPlayingState(activeId, false);
        document.getElementById(`player-${activeId}`).classList.remove('visible');
      }
      clearInterval(progressInterval);
      activeId = id;
      dashAudio.src = audioUrl;
      document.getElementById(`player-${id}`).classList.add('visible');
      document.getElementById(`dur-${id}`).textContent = `${durationMin}:00`;
      dashAudio.play().catch(() => {
        activeId = null;
        document.getElementById(`player-${id}`).classList.remove('visible');
      });
      setPlayingState(id, true);
      progressInterval = setInterval(() => {
        if (!dashAudio.duration) return;
        const pct = (dashAudio.currentTime / dashAudio.duration) * 100;
        const fill = document.getElementById(`fill-${id}`);
        const timeEl = document.getElementById(`time-${id}`);
        if (fill)   fill.style.width = `${pct}%`;
        if (timeEl) timeEl.textContent = formatTime(Math.floor(dashAudio.currentTime));
      }, 400);
      dashAudio.onended = () => {
        setPlayingState(id, false);
        clearInterval(progressInterval);
        const fill = document.getElementById(`fill-${id}`);
        const timeEl = document.getElementById(`time-${id}`);
        if (fill)   fill.style.width = '0%';
        if (timeEl) timeEl.textContent = '0:00';
        activeId = null;
      };
    }

    function seekMed(id, event) {
      if (activeId !== id || !dashAudio.duration) return;
      const rect  = event.currentTarget.getBoundingClientRect();
      const ratio = Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width));
      dashAudio.currentTime = ratio * dashAudio.duration;
    }

    function setPlayingState(id, playing) {
      const btn  = document.getElementById(`play-btn-${id}`);
      const iPlay  = document.getElementById(`icon-play-${id}`);
      const iPause = document.getElementById(`icon-pause-${id}`);
      if (!btn) return;
      btn.classList.toggle('playing', playing);
      if (iPlay)  iPlay.style.display  = playing ? 'none'  : 'block';
      if (iPause) iPause.style.display = playing ? 'block' : 'none';
    }

    function formatTime(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

    function formatDate(iso) {
      const d   = new Date(iso);
      const now = new Date();
      const s   = (dt) => dt.toISOString().slice(0,10);
      if (s(d) === s(now)) return 'Hoy';
      if (s(d) === s(new Date(Date.now()-86400000))) return 'Ayer';
      const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
      const label  = `${d.getDate()} ${months[d.getMonth()]}`;
      return d.getFullYear() !== now.getFullYear() ? `${label} ${d.getFullYear()}` : label;
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escapeAttr(s) {
      return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    initClerk();
  </script>

</body>
</html>
