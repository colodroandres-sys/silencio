<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Stillova</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0a0e08;
      --surface:#111a0e;
      --border: rgba(242,237,228,0.08);
      --sand:   #c9a96e;
      --text:   #f2ede4;
      --text-60:rgba(242,237,228,0.6);
      --text-35:rgba(242,237,228,0.35);
      --green:  #4caf7d;
      --red:    #e57373;
      --yellow: #f0b429;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Login ─────────────────────────────── */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
    }
    #login-screen h1 {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 1.8rem;
      color: var(--sand);
    }
    #pw-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 18px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      width: 260px;
      outline: none;
      text-align: center;
    }
    #pw-input:focus { border-color: rgba(201,169,110,0.4); }
    #pw-btn {
      background: var(--sand);
      color: #0a0e08;
      border: none;
      border-radius: 24px;
      padding: 10px 32px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    #pw-error { color: var(--red); font-size: 12px; display: none; }

    /* ── Dashboard ─────────────────────────── */
    #dashboard { display: none; padding: 32px 24px 80px; max-width: 1100px; margin: 0 auto; }

    .dash-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }
    .dash-header h1 {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 1.5rem;
      color: var(--sand);
    }
    .dash-meta { color: var(--text-35); font-size: 12px; margin-top: 3px; }
    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-60);
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }
    .refresh-btn:hover { border-color: rgba(242,237,228,0.2); color: var(--text); }

    /* ── KPI grid ───────────────────────────── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 16px;
    }
    .kpi-label { font-size: 11px; color: var(--text-35); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .kpi-value { font-size: 1.9rem; font-weight: 600; line-height: 1; }
    .kpi-sub   { font-size: 11px; color: var(--text-35); margin-top: 6px; }
    .kpi-value.green  { color: var(--green); }
    .kpi-value.sand   { color: var(--sand); }
    .kpi-value.yellow { color: var(--yellow); }

    /* ── Section ────────────────────────────── */
    .section { margin-bottom: 32px; }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-35);
      margin-bottom: 12px;
    }

    /* ── Plan bars ──────────────────────────── */
    .plan-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .plan-name { width: 72px; font-size: 12px; color: var(--text-60); }
    .plan-bar-wrap { flex: 1; background: rgba(242,237,228,0.06); border-radius: 4px; height: 8px; overflow: hidden; }
    .plan-bar { height: 100%; border-radius: 4px; transition: width 0.6s ease; min-width: 2px; }
    .plan-bar.free      { background: var(--text-35); }
    .plan-bar.essential { background: var(--sand); }
    .plan-bar.premium   { background: var(--green); }
    .plan-count { width: 36px; text-align: right; font-size: 12px; color: var(--text-60); }

    /* ── Funnel ─────────────────────────────── */
    .funnel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .funnel-step {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      text-align: center;
    }
    .funnel-num   { font-size: 1.7rem; font-weight: 600; color: var(--sand); line-height: 1; }
    .funnel-label { font-size: 11px; color: var(--text-35); margin-top: 6px; line-height: 1.5; }
    .funnel-pct   { font-size: 11px; color: var(--text-60); margin-top: 4px; }

    /* ── Table ──────────────────────────────── */
    .table-controls { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    #search-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      width: 220px;
      outline: none;
    }
    #search-input:focus { border-color: rgba(201,169,110,0.3); }
    .plan-filter { display: flex; gap: 6px; }
    .plan-filter button {
      background: none;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 11px;
      color: var(--text-35);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }
    .plan-filter button.active { border-color: var(--sand); color: var(--sand); }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead th {
      text-align: left;
      padding: 8px 12px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-35);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    thead th:hover { color: var(--text-60); }
    tbody tr { border-bottom: 1px solid rgba(242,237,228,0.04); }
    tbody tr:hover { background: rgba(242,237,228,0.03); }
    tbody td { padding: 9px 12px; color: var(--text-60); white-space: nowrap; }
    tbody td.email { color: var(--text); max-width: 220px; overflow: hidden; text-overflow: ellipsis; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 500; }
    .badge-free      { background: rgba(242,237,228,0.07); color: var(--text-35); }
    .badge-essential { background: rgba(201,169,110,0.15); color: var(--sand); }
    .badge-premium   { background: rgba(76,175,125,0.15);  color: var(--green); }

    .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
    .dot-green  { background: var(--green); }
    .dot-yellow { background: var(--yellow); }
    .dot-grey   { background: var(--text-35); }

    .loading   { text-align: center; padding: 80px; color: var(--text-35); }
    .error-msg { text-align: center; padding: 60px; color: var(--red); font-size: 13px; }
  </style>
</head>
<body>

  <div id="login-screen">
    <h1>Stillova Admin</h1>
    <input id="pw-input" type="password" placeholder="Contraseña" autocomplete="off"
           onkeydown="if(event.key==='Enter')login()">
    <button id="pw-btn" onclick="login()">Entrar</button>
    <p id="pw-error">Contraseña incorrecta</p>
  </div>

  <div id="dashboard">
    <div class="dash-header">
      <div>
        <h1>Stillova</h1>
        <p class="dash-meta" id="dash-meta"></p>
      </div>
      <button class="refresh-btn" onclick="loadData()">↺ Actualizar</button>
    </div>
    <div id="dash-body"><div class="loading">Cargando...</div></div>
  </div>

  <script>
    let pw = '';
    let allUsers = [];
    let sortCol = 'created_at';
    let sortDir = -1;
    let planFilter = '';

    function login() {
      pw = document.getElementById('pw-input').value.trim();
      if (!pw) return;
      document.getElementById('pw-error').style.display = 'none';
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadData();
    }

    async function loadData() {
      document.getElementById('dash-body').innerHTML = '<div class="loading">Cargando...</div>';
      try {
        const res = await fetch(`/api/admin?password=${encodeURIComponent(pw)}`);
        if (res.status === 401) {
          document.getElementById('dashboard').style.display = 'none';
          document.getElementById('login-screen').style.display = 'flex';
          document.getElementById('pw-error').style.display = 'block';
          return;
        }
        if (!res.ok) throw new Error('Error del servidor');
        const data = await res.json();
        allUsers = data.users || [];
        render(data);
      } catch(e) {
        document.getElementById('dash-body').innerHTML = `<div class="error-msg">Error: ${e.message}</div>`;
      }
    }

    function render(d) {
      const now = new Date();
      document.getElementById('dash-meta').textContent =
        `Actualizado ${now.toLocaleTimeString('es', {hour:'2-digit', minute:'2-digit'})} · ${d.month}`;

      document.getElementById('dash-body').innerHTML = `

        <div class="kpi-grid">
          <div class="kpi-card">
            <div class="kpi-label">MRR</div>
            <div class="kpi-value sand">€${d.mrr.toFixed(2)}</div>
            <div class="kpi-sub">${d.paying} cliente${d.paying !== 1 ? 's' : ''} de pago</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Conversión</div>
            <div class="kpi-value ${d.conversionRate >= 5 ? 'green' : 'yellow'}">${d.conversionRate}%</div>
            <div class="kpi-sub">Free → pago</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Activación</div>
            <div class="kpi-value ${d.activationRate >= 50 ? 'green' : 'yellow'}">${d.activationRate}%</div>
            <div class="kpi-sub">Usaron la app</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Usuarios</div>
            <div class="kpi-value">${d.totalUsers}</div>
            <div class="kpi-sub">+${d.newThisWeek} esta semana</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Activos 7 días</div>
            <div class="kpi-value">${d.activeThisWeek}</div>
            <div class="kpi-sub">de ${d.totalUsers} totales</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Meditaciones hoy</div>
            <div class="kpi-value">${d.medsToday}</div>
            <div class="kpi-sub">${d.medsThisWeek} esta semana</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Meditaciones mes</div>
            <div class="kpi-value">${d.medsThisMonth}</div>
            <div class="kpi-sub">${d.medsTotal} totales histórico</div>
          </div>
        </div>

        <div class="section">
          <p class="section-title">Distribución de planes</p>
          ${renderPlanBars(d)}
        </div>

        <div class="section">
          <p class="section-title">Embudo de conversión</p>
          <div class="funnel-grid">
            <div class="funnel-step">
              <div class="funnel-num">${d.totalUsers}</div>
              <div class="funnel-label">Se registraron</div>
            </div>
            <div class="funnel-step">
              <div class="funnel-num">${d.usedFreeCredit}</div>
              <div class="funnel-label">Generaron al menos 1 meditación</div>
              <div class="funnel-pct">${d.totalUsers > 0 ? ((d.usedFreeCredit/d.totalUsers)*100).toFixed(0) : 0}% del total</div>
            </div>
            <div class="funnel-step">
              <div class="funnel-num">${d.paying}</div>
              <div class="funnel-label">Compraron un plan</div>
              <div class="funnel-pct">${d.usedFreeCredit > 0 ? ((d.paying/d.usedFreeCredit)*100).toFixed(0) : 0}% de los activados</div>
            </div>
          </div>
        </div>

        <div class="section">
          <p class="section-title">Usuarios (${allUsers.length})</p>
          <div class="table-controls">
            <input id="search-input" type="text" placeholder="Buscar por email..." oninput="renderTable()">
            <div class="plan-filter">
              <button onclick="setPlanFilter('')"           id="filter-all"       class="active">Todos</button>
              <button onclick="setPlanFilter('premium')"    id="filter-premium"             >Premium</button>
              <button onclick="setPlanFilter('essential')"  id="filter-essential"           >Essential</button>
              <button onclick="setPlanFilter('free')"       id="filter-free"                >Free</button>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th onclick="sortBy('email')">Email</th>
                  <th onclick="sortBy('plan')">Plan</th>
                  <th onclick="sortBy('total_meds')">Meditaciones</th>
                  <th onclick="sortBy('credits_used')">Créditos usados</th>
                  <th onclick="sortBy('last_activity')">Última actividad</th>
                  <th onclick="sortBy('created_at')">Registro</th>
                </tr>
              </thead>
              <tbody id="users-tbody"></tbody>
            </table>
          </div>
        </div>
      `;

      renderTable();
    }

    function renderPlanBars(d) {
      const total = d.totalUsers || 1;
      return ['premium','essential','free'].map(plan => {
        const n = d.byPlan[plan] || 0;
        const pct = Math.round((n / total) * 100);
        return `<div class="plan-row">
          <span class="plan-name">${plan.charAt(0).toUpperCase() + plan.slice(1)}</span>
          <div class="plan-bar-wrap"><div class="plan-bar ${plan}" style="width:${pct}%"></div></div>
          <span class="plan-count">${n}</span>
        </div>`;
      }).join('');
    }

    function renderTable() {
      const q = (document.getElementById('search-input')?.value || '').toLowerCase();
      let users = allUsers.filter(u => {
        if (planFilter && u.plan !== planFilter) return false;
        if (q && !u.email.toLowerCase().includes(q)) return false;
        return true;
      });

      users.sort((a, b) => {
        let va = a[sortCol] ?? '', vb = b[sortCol] ?? '';
        if (typeof va === 'string') va = va.toLowerCase();
        if (typeof vb === 'string') vb = vb.toLowerCase();
        return va < vb ? -sortDir : va > vb ? sortDir : 0;
      });

      const tbody = document.getElementById('users-tbody');
      if (!tbody) return;

      tbody.innerHTML = users.slice(0, 200).map(u => {
        const lastAct = u.last_activity ? relativeDate(u.last_activity) : '—';
        const regDate = u.created_at ? formatDate(u.created_at) : '—';
        const dot = !u.last_activity ? 'grey'
          : new Date(u.last_activity) >= new Date(Date.now() - 7*86400000) ? 'green' : 'yellow';
        return `<tr>
          <td class="email">${esc(u.email)}</td>
          <td><span class="badge badge-${u.plan}">${u.plan}</span></td>
          <td>${u.total_meds}</td>
          <td>${u.credits_used}</td>
          <td><span class="dot dot-${dot}"></span>${lastAct}</td>
          <td>${regDate}</td>
        </tr>`;
      }).join('') || '<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--text-35)">Sin resultados</td></tr>';
    }

    function sortBy(col) {
      if (sortCol === col) sortDir *= -1;
      else { sortCol = col; sortDir = -1; }
      renderTable();
    }

    function setPlanFilter(plan) {
      planFilter = plan;
      ['all','premium','essential','free'].forEach(p => {
        document.getElementById(`filter-${p}`)?.classList.toggle('active', (!plan && p === 'all') || p === plan);
      });
      renderTable();
    }

    function relativeDate(iso) {
      const h = Math.floor((Date.now() - new Date(iso)) / 3600000);
      if (h < 1)  return 'Hace menos de 1h';
      if (h < 24) return `Hace ${h}h`;
      const d = Math.floor(h / 24);
      if (d === 1) return 'Ayer';
      if (d < 7)  return `Hace ${d} días`;
      if (d < 30) return `Hace ${Math.floor(d/7)} sem`;
      return `Hace ${Math.floor(d/30)} meses`;
    }

    function formatDate(iso) {
      const d = new Date(iso);
      const m = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
      return `${d.getDate()} ${m[d.getMonth()]}${d.getFullYear() !== new Date().getFullYear() ? ' '+d.getFullYear() : ''}`;
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    setInterval(loadData, 5 * 60 * 1000);
    document.getElementById('pw-input').focus();
  </script>

</body>
</html>
